name: PR Quality Gate CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  ci:
    # Skip the job entirely if there is no package.json yet
    if: hashFiles('package.json') != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Tests
        run: npm test --if-present

      - name: Build
        run: npm run build
