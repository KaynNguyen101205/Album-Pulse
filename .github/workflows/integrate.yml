# Integration check on main (valid workflow; do not use fromFile - not supported in GitHub Actions)
name: Integrate (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  integrate:
    if: hashFiles('package.json') != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build
