name: Integrate (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  integrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Verify critical dependencies
        run: node -e "require('zod')"
        # Fail fast with a clear error if zod (or other deps) are missing; ensures package-lock.json is in sync with package.json.

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          # Schema-only; no DB connection. Prisma just needs any valid-looking URL.
          DATABASE_URL: postgresql://localhost:5432/albumpulse?schema=public

      - name: Lint
        run: npm run lint --if-present

      # Typecheck fails until app code is migrated to new schema (User, Session, Album mbid, WeeklyDrop).
      - name: Typecheck
        run: npm run typecheck --if-present
        continue-on-error: true

      # Build fails until app code is migrated to new schema.
      - name: Build
        run: npm run build
        continue-on-error: true
